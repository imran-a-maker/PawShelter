<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hayvanlar – PawShelter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-gray-50 font-sans">

  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center space-x-2">
          <span class="text-2xl">🐾</span>
          <span class="text-xl font-bold text-purple-700">PawShelter</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
          <a href="index.html" class="text-gray-600 hover:text-purple-700 transition">Ana Sayfa</a>
          <a href="animals.html" class="text-purple-700 font-semibold border-b-2 border-purple-700 pb-1">Hayvanlar</a>
          <a href="adoptions.html" class="text-gray-600 hover:text-purple-700 transition">Sahiplenme</a>
          <a href="dashboard.html" class="text-gray-650 hover:text-purple-700 transition">Dashboard</a>
          <div id="navAuthArea" class="hidden md:flex items-center space-x-6">
            <a href="login.html" class="bg-purple-700 text-white px-4 py-2 rounded-lg hover:bg-purple-800 transition">Giriş Yap</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-bold text-gray-800">Hayvanlar</h1>
        <p class="text-gray-500 mt-1">Barınaktaki tüm hayvanları görüntüleyin ve filtreleyin.</p>
      </div>
      <div class="flex gap-3">
        <div class="relative">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input id="searchInput" type="text" placeholder="Hayvan ara..." class="pl-10 pr-4 py-2 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-400 bg-white w-64" />
        </div>
        <button onclick="openAddAnimalModal()" class="bg-purple-700 text-white px-4 py-2 rounded-xl hover:bg-purple-800 transition font-semibold">
          <i class="fas fa-plus mr-2"></i>Ekle
        </button>
      </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-6">

      <aside class="w-full lg:w-64 flex-shrink-0">
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
          <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
            <i class="fas fa-filter text-purple-600"></i> Filtreler
          </h3>

          <div class="mb-5">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Tür</label>
            <div class="space-y-2">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" class="filter-species accent-purple-600" value="all" checked /> <span class="text-sm text-gray-600">Tümü</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" class="filter-species accent-purple-600" value="dog" /> <span class="text-sm text-gray-600">🐕 Köpek</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" class="filter-species accent-purple-600" value="cat" /> <span class="text-sm text-gray-600">🐈 Kedi</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" class="filter-species accent-purple-600" value="bird" /> <span class="text-sm text-gray-600">🐦 Kuş</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" class="filter-species accent-purple-600" value="other" /> <span class="text-sm text-gray-600">🐇 Diğer</span>
              </label>
            </div>
          </div>

          <div class="mb-5">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Yaş Aralığı</label>
            <select id="ageFilter" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400">
              <option value="all">Tümü</option>
              <option value="young">0–2 yaş (Yavru)</option>
              <option value="adult">2–7 yaş (Yetişkin)</option>
              <option value="senior">7+ yaş (Yaşlı)</option>
            </select>
          </div>

          <div class="mb-5">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Cinsiyet</label>
            <div class="space-y-2">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="gender" class="accent-purple-600" value="all" checked /> <span class="text-sm text-gray-600">Tümü</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="gender" class="accent-purple-600" value="male" /> <span class="text-sm text-gray-600">Erkek</span>
              </label>
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="radio" name="gender" class="accent-purple-600" value="female" /> <span class="text-sm text-gray-600">Dişi</span>
              </label>
            </div>
          </div>

          <div class="mb-5">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Durum</label>
            <select id="statusFilter" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400">
              <option value="all">Tümü</option>
              <option value="available">Sahiplenilebilir</option>
              <option value="pending">Beklemede</option>
              <option value="adopted">Sahiplenildi</option>
            </select>
          </div>

          <button id="clearFilters" class="w-full border border-gray-200 text-gray-600 py-2 rounded-xl text-sm hover:bg-gray-50 transition">
            <i class="fas fa-times mr-1"></i>Filtreleri Temizle
          </button>
        </div>
      </aside>

      <div class="flex-1">
        <div class="flex items-center justify-between mb-4">
          <span id="resultCount" class="text-sm text-gray-500">10 hayvan listeleniyor</span>
          <select class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400 bg-white">
            <option>En Yeni</option>
            <option>İsim (A-Z)</option>
            <option>Yaş (Küçük-Büyük)</option>
          </select>
        </div>

        <div id="animalsGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
          </div>

        <div class="flex justify-center mt-8 gap-2">
          <button class="px-4 py-2 rounded-lg border border-gray-200 text-gray-500 hover:bg-gray-50 transition text-sm">
            <i class="fas fa-chevron-left"></i>
          </button>
          <button class="px-4 py-2 rounded-lg bg-purple-700 text-white text-sm font-semibold">1</button>
          <button class="px-4 py-2 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition text-sm">2</button>
          <button class="px-4 py-2 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition text-sm">3</button>
          <button class="px-4 py-2 rounded-lg border border-gray-200 text-gray-500 hover:bg-gray-50 transition text-sm">
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="adoptionModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold text-gray-800">Sahiplenme Başvurusu</h3>
        <button id="closeModal" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button>
      </div>
      <div id="modalAnimalInfo" class="bg-purple-50 rounded-xl p-4 mb-6"></div>
      <form id="adoptionForm">
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Adınız Soyadınız</label>
          <input type="text" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400" placeholder="Adınızı girin" />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">E-posta</label>
          <input type="email" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400" placeholder="email@ornek.com" />
        </div>
        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Mesajınız</label>
          <textarea rows="3" class="w-full border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-purple-400 resize-none" placeholder="Kendinizi ve yaşam koşullarınızı kısaca anlatın..."></textarea>
        </div>
        <button type="submit" class="w-full bg-purple-700 text-white py-3 rounded-xl font-bold hover:bg-purple-800 transition">
          <i class="fas fa-heart mr-2"></i>Başvuru Gönder
        </button>
      </form>
    </div>
  </div>

  <div id="addAnimalModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold text-gray-800">Yeni Hayvan Kaydı</h3>
        <button onclick="closeAddAnimalModal()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button>
      </div>
      
      <form id="addAnimalForm">
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Hayvanın Adı</label>
          <input id="addName" type="text" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-400" placeholder="Örn: Pamuk" />
        </div>
        
        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Tür</label>
            <select id="addSpecies" required class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400 bg-white">
              <option value="dog">🐕 Köpek</option>
              <option value="cat">🐈 Kedi</option>
              <option value="bird">🐦 Kuş</option>
              <option value="other">🐇 Diğer</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Cins / Irk</label>
            <input id="addBreed" type="text" required class="w-full border border-gray-200 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400" placeholder="Örn: Golden" />
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Yaş</label>
            <input id="addAge" type="number" min="0" required class="w-full border border-gray-200 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-400" placeholder="Örn: 2" />
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Cinsiyet</label>
            <select id="addGender" required class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400 bg-white">
              <option value="male">Erkek</option>
              <option value="female">Dişi</option>
            </select>
          </div>
        </div>

        <div class="mb-4">
          <label class="flex items-center gap-2 cursor-pointer mt-2">
            <input id="addVaccinated" type="checkbox" class="accent-purple-600 h-4 w-4" />
            <span class="text-sm font-semibold text-gray-700">Aşıları Tamamlandı mı?</span>
          </label>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-semibold text-gray-700 mb-2">Açıklama</label>
          <textarea id="addDescription" rows="3" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-400 resize-none" placeholder="Hayvan hakkında kısa bilgi..."></textarea>
        </div>

        <button type="submit" class="w-full bg-purple-700 text-white py-3 rounded-xl font-bold hover:bg-purple-800 transition">
          <i class="fas fa-plus mr-2"></i>Barınağa Kaydet
        </button>
      </form>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/animals.js"></script>
</body>
</html>
