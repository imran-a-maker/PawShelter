<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahiplenme Talepleri – PawShelter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="bg-gray-50 font-sans">

  <!-- Navbar -->
  <nav class="bg-white shadow-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center space-x-2">
          <span class="text-2xl">🐾</span>
          <span class="text-xl font-bold text-purple-700">PawShelter</span>
        </div>
        <div class="hidden md:flex items-center space-x-6">
          <a href="index.html" class="text-gray-600 hover:text-purple-700 transition">Ana Sayfa</a>
          <a href="animals.html" class="text-gray-600 hover:text-purple-700 transition">Hayvanlar</a>
          <a href="adoptions.html" class="text-purple-700 font-semibold border-b-2 border-purple-700 pb-1">Sahiplenme</a>
          <a href="dashboard.html" class="text-gray-650 hover:text-purple-700 transition">Dashboard</a>
<div id="navAuthArea" class="hidden md:flex items-center space-x-6">
  <a href="login.html" class="bg-purple-700 text-white px-4 py-2 rounded-lg hover:bg-purple-800 transition">Giriş Yap</a>
</div>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 py-8">
    <!-- Page Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-bold text-gray-800">Sahiplenme Talepleri</h1>
        <p class="text-gray-500 mt-1">Tüm sahiplenme başvurularını yönetin ve değerlendirin.</p>
      </div>
      <div class="flex gap-3 flex-wrap">
        <button id="filterAll" class="filter-btn active px-4 py-2 rounded-xl text-sm font-semibold bg-purple-700 text-white">Tümü</button>
        <button id="filterPending" class="filter-btn px-4 py-2 rounded-xl text-sm font-semibold bg-white border border-gray-200 text-gray-600 hover:bg-yellow-50 hover:border-yellow-300 hover:text-yellow-700 transition">Beklemede</button>
        <button id="filterApproved" class="filter-btn px-4 py-2 rounded-xl text-sm font-semibold bg-white border border-gray-200 text-gray-600 hover:bg-green-50 hover:border-green-300 hover:text-green-700 transition">Onaylandı</button>
        <button id="filterRejected" class="filter-btn px-4 py-2 rounded-xl text-sm font-semibold bg-white border border-gray-200 text-gray-600 hover:bg-red-50 hover:border-red-300 hover:text-red-700 transition">Reddedildi</button>
      </div>
    </div>

    <!-- Stats Row -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 text-center">
        <div class="text-2xl font-bold text-gray-800" id="totalCount">8</div>
        <div class="text-xs text-gray-500 mt-1">Toplam Talep</div>
      </div>
      <div class="bg-yellow-50 rounded-xl p-4 shadow-sm border border-yellow-100 text-center">
        <div class="text-2xl font-bold text-yellow-700" id="pendingCount">3</div>
        <div class="text-xs text-yellow-600 mt-1">Beklemede</div>
      </div>
      <div class="bg-green-50 rounded-xl p-4 shadow-sm border border-green-100 text-center">
        <div class="text-2xl font-bold text-green-700" id="approvedCount">3</div>
        <div class="text-xs text-green-600 mt-1">Onaylandı</div>
      </div>
      <div class="bg-red-50 rounded-xl p-4 shadow-sm border border-red-100 text-center">
        <div class="text-2xl font-bold text-red-700" id="rejectedCount">2</div>
        <div class="text-xs text-red-600 mt-1">Reddedildi</div>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 border-b border-gray-100">
            <tr>
              <th class="text-left px-6 py-4 font-semibold text-gray-600">ID</th>
              <th class="text-left px-6 py-4 font-semibold text-gray-600">Hayvan</th>
              <th class="text-left px-6 py-4 font-semibold text-gray-600">Başvuran</th>
              <th class="text-left px-6 py-4 font-semibold text-gray-600">Tarih</th>
              <th class="text-left px-6 py-4 font-semibold text-gray-600">Durum</th>
              <th class="text-left px-6 py-4 font-semibold text-gray-600">İşlemler</th>
            </tr>
          </thead>
          <tbody id="adoptionsTableBody" class="divide-y divide-gray-50">
            <!-- Populated by adoptions.js -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detailModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-8 max-w-lg w-full shadow-2xl">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold text-gray-800">Talep Detayı</h3>
        <button id="closeDetailModal" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button>
      </div>
      <div id="detailContent"></div>
      <div id="detailActions" class="flex gap-3 mt-6"></div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 hidden">
    <div class="bg-gray-900 text-white px-6 py-3 rounded-xl shadow-lg flex items-center gap-3">
      <i id="toastIcon" class="fas fa-check-circle text-green-400"></i>
      <span id="toastMsg">İşlem başarılı</span>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/adoptions.js"></script>
</body>
</html>
